<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security"
      lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Header</title>
</head>
<body>

<!-- Header Fragment -->
<header th:fragment="headerFragment" class="header">
    <div class="header-container">
        <!-- Logo -->
        <a href="/products/main" class="logo">
            <img th:src="@{/image/logo.png}" alt="Online Shop" />
            <span>Online Shop</span>
        </a>

        <!-- Search Form -->
        <form action="/products/main/search" method="get" class="search-form">
            <input type="search"
                   name="name"
                   class="search-input"
                   th:placeholder="#{search.placeholder}"
                   th:aria-label="#{search.placeholder}"
                   autocomplete="off">
            <button type="submit" class="search-button" th:aria-label="#{search.button}">
                <svg width="16" height="16" fill="currentColor" viewBox="0 0 20 20">
                    <path fill-rule="evenodd" d="M8 4a4 4 0 100 8 4 4 0 000-8zM2 8a6 6 0 1110.89 3.476l4.817 4.817a1 1 0 01-1.414 1.414l-4.816-4.816A6 6 0 012 8z" clip-rule="evenodd"/>
                </svg>
            </button>
        </form>

        <!-- Category Filter -->
        <div class="category-filter">
            <select class="category-select" th:aria-label="#{product.category}">
                <option value="" th:text="#{menu.all.categories}">Все категории</option>
                <option th:each="category : ${categories}"
                        th:value="${category.id}"
                        th:text="${category.name}">
                    Категория
                </option>
            </select>
        </div>

        <!-- Language Switcher -->
        <div class="language-switcher">
            <a th:href="@{''(lang='ru')}" class="lang-link" title="Русский">RU</a>
            <span class="lang-divider">|</span>
            <a th:href="@{''(lang='en')}" class="lang-link" title="English">EN</a>
            <span class="lang-divider">|</span>
            <a th:href="@{''(lang='kk')}" class="lang-link" title="Қазақша">KZ</a>
        </div>

        <!-- Navigation -->
        <nav class="nav" role="navigation">
            <!-- Guest Navigation -->
            <div sec:authorize="isAnonymous()" class="flex gap-2">
                <a href="/login" class="nav-link">
                    <svg width="16" height="16" fill="currentColor" viewBox="0 0 20 20">
                        <path fill-rule="evenodd" d="M3 3a1 1 0 011 1v12a1 1 0 11-2 0V4a1 1 0 011-1zm7.707 3.293a1 1 0 010 1.414L9.414 9H17a1 1 0 110 2H9.414l1.293 1.293a1 1 0 01-1.414 1.414l-3-3a1 1 0 010-1.414l3-3a1 1 0 011.414 0z" clip-rule="evenodd"/>
                    </svg>
                    <span th:text="#{menu.login}">Вход</span>
                </a>
                <a href="/auth/registration" class="nav-link nav-link-primary" th:text="#{menu.register}">
                    Регистрация
                </a>
            </div>

            <!-- Authenticated User Navigation -->
            <div sec:authorize="isAuthenticated()" class="flex gap-4 items-center">
                <!-- User Profile -->
                <a href="/profile" class="nav-link nav-icon">
                    <svg width="20" height="20" fill="currentColor" viewBox="0 0 20 20">
                        <path fill-rule="evenodd" d="M10 9a3 3 0 100-6 3 3 0 000 6zm-7 9a7 7 0 1114 0H3z" clip-rule="evenodd"/>
                    </svg>
                    <span sec:authentication="name" th:text="#{menu.profile}">Профиль</span>
                </a>

                <!-- Cart -->
                <a href="/cart" class="nav-link nav-icon">
                    <svg width="20" height="20" fill="currentColor" viewBox="0 0 20 20">
                        <path d="M3 1a1 1 0 000 2h1.22l.305 1.222a.997.997 0 00.01.042l1.358 5.43-.893.892C3.74 11.846 4.632 14 6.414 14H15a1 1 0 000-2H6.414l1-1H14a1 1 0 00.894-.553l3-6A1 1 0 0017 3H6.28l-.31-1.243A1 1 0 005 1H3zM16 16.5a1.5 1.5 0 11-3 0 1.5 1.5 0 013 0zM6.5 18a1.5 1.5 0 100-3 1.5 1.5 0 000 3z"/>
                    </svg>
                    <span th:text="#{menu.cart}">Корзина</span>
                    <span class="cart-badge">0</span>
                </a>

                <!-- Admin CRUD (only for admins) -->
                <a sec:authorize="hasRole('ADMIN')" href="/products/admin" class="nav-link">
                    <svg width="20" height="20" fill="currentColor" viewBox="0 0 20 20">
                        <path d="M11 17a1 1 0 001.447.894l4-2A1 1 0 0017 15V9.236a1 1 0 00-1.447-.894l-4 2a1 1 0 00-.553.894V17zM15.211 6.276a1 1 0 000-1.788l-4.764-2.382a1 1 0 00-.894 0L4.789 4.488a1 1 0 000 1.788l4.764 2.382a1 1 0 00.894 0l4.764-2.382zM4.447 8.342A1 1 0 003 9.236V15a1 1 0 00.553.894l4 2A1 1 0 009 17v-5.764a1 1 0 00-.553-.894l-4-2z"/>
                    </svg>
                    <span th:text="#{menu.admin}">Админ-Панель</span>
                </a>

                <!-- Logout -->
                <form action="/logout" method="post" style="display: inline;">
                    <button type="submit" class="nav-link" style="background: none; border: none; cursor: pointer;">
                        <svg width="16" height="16" fill="currentColor" viewBox="0 0 20 20">
                            <path fill-rule="evenodd" d="M3 3a1 1 0 00-1 1v12a1 1 0 102 0V4a1 1 0 00-1-1zm10.293 9.293a1 1 0 001.414 1.414l3-3a1 1 0 000-1.414l-3-3a1 1 0 10-1.414 1.414L14.586 9H7a1 1 0 100 2h7.586l-1.293 1.293z" clip-rule="evenodd"/>
                        </svg>
                        <span th:text="#{menu.logout}">Выход</span>
                    </button>
                </form>
            </div>
        </nav>
    </div>
</header>

</body>
</html>
