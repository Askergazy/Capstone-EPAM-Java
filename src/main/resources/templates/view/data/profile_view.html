<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="#{profile.title} + ' - Online Shop'">Профиль - Online Shop</title>
    <link rel="stylesheet" href="/css/variables.css">
    <link rel="stylesheet" href="/css/base.css">
    <link rel="stylesheet" href="/css/header.css">
    <link rel="stylesheet" href="/css/components.css">
    <style>
        .profile-container {
            max-width: 1000px;
            margin: 0 auto;
            padding: var(--space-8) var(--space-4);
        }

        .profile-header {
            display: flex;
            align-items: center;
            gap: var(--space-6);
            padding: var(--space-8);
            background: linear-gradient(135deg, var(--primary-light) 0%, var(--white) 100%);
            border-radius: var(--radius-lg);
            margin-bottom: var(--space-8);
        }

        .profile-avatar {
            width: 100px;
            height: 100px;
            border-radius: var(--radius-full);
            background: var(--primary-color);
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--white);
            font-size: var(--text-4xl);
            font-weight: 700;
            box-shadow: var(--shadow-lg);
        }

        .profile-info {
            flex: 1;
        }

        .profile-name {
            font-size: var(--text-3xl);
            font-weight: 700;
            color: var(--gray-900);
            margin-bottom: var(--space-2);
        }

        .profile-details {
            color: var(--gray-600);
            font-size: var(--text-lg);
        }

        .profile-section {
            background: var(--white);
            border: 1px solid var(--gray-200);
            border-radius: var(--radius-lg);
            padding: var(--space-6);
            margin-bottom: var(--space-6);
        }

        .section-title {
            font-size: var(--text-2xl);
            font-weight: 700;
            color: var(--gray-900);
            margin-bottom: var(--space-6);
            padding-bottom: var(--space-4);
            border-bottom: 2px solid var(--gray-200);
        }

        .orders-list {
            display: flex;
            flex-direction: column;
            gap: var(--space-3);
        }

        .order-item {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: var(--space-4);
            background: var(--gray-50);
            border: 1px solid var(--gray-200);
            border-radius: var(--radius-md);
            transition: all var(--transition-fast);
            text-decoration: none;
        }

        .order-item:hover {
            background: var(--white);
            box-shadow: var(--shadow-sm);
            transform: translateX(4px);
        }

        .order-number {
            font-weight: 600;
            color: var(--gray-900);
            font-size: var(--text-lg);
        }

        .order-icon {
            color: var(--gray-400);
        }

        .no-orders {
            text-align: center;
            padding: var(--space-12) var(--space-4);
        }

        .no-orders-icon {
            width: 80px;
            height: 80px;
            margin: 0 auto var(--space-4);
            background: var(--gray-100);
            border-radius: var(--radius-full);
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--gray-400);
        }

        .no-orders-text {
            color: var(--gray-600);
            font-size: var(--text-lg);
        }

        .profile-actions {
            display: flex;
            gap: var(--space-3);
            margin-top: var(--space-6);
        }

        .btn-logout {
            background: var(--white);
            color: var(--danger-color);
            border: 1px solid var(--danger-color);
        }

        .btn-logout:hover {
            background: var(--danger-color);
            color: var(--white);
        }
    </style>
</head>
<body>
    <div th:replace="~{fragments/header_example::headerFragment}"></div>

    <main class="profile-container">
        <div class="profile-header">
            <div class="profile-avatar">
                <span th:text="${user.name.substring(0, 1).toUpperCase()}">U</span>
            </div>
            <div class="profile-info">
                <h1 class="profile-name" th:text="${user.name} + ' ' + ${user.lastName}">
                    Имя Фамилия
                </h1>
                <div class="profile-details" th:text="#{app.title}">
                    Пользователь Online Shop
                </div>
            </div>
        </div>

        <div class="profile-section">
            <h2 class="section-title" th:text="#{order.your.orders}">Мои заказы</h2>

            <div th:if="${orders.isEmpty()}" class="no-orders">
                <div class="no-orders-icon">
                    <svg width="48" height="48" fill="currentColor" viewBox="0 0 20 20">
                        <path d="M3 1a1 1 0 000 2h1.22l.305 1.222a.997.997 0 00.01.042l1.358 5.43-.893.892C3.74 11.846 4.632 14 6.414 14H15a1 1 0 000-2H6.414l1-1H14a1 1 0 00.894-.553l3-6A1 1 0 0017 3H6.28l-.31-1.243A1 1 0 005 1H3zM16 16.5a1.5 1.5 0 11-3 0 1.5 1.5 0 013 0zM6.5 18a1.5 1.5 0 100-3 1.5 1.5 0 000 3z"/>
                    </svg>
                </div>
                <p class="no-orders-text">
                    <b th:text="#{order.no.orders}">У вас пока нет заказов</b>
                </p>
            </div>

            <div th:if="${!orders.isEmpty()}" class="orders-list">
                <a th:each="order : ${orders}"
                   th:href="@{/order/view(orderId=${order.id})}"
                   class="order-item">
                    <span class="order-number" th:text="#{order.number} + ' ' + ${order.id}">
                        Заказ № 1
                    </span>
                    <svg class="order-icon" width="24" height="24" fill="currentColor" viewBox="0 0 20 20">
                        <path fill-rule="evenodd" d="M7.293 14.707a1 1 0 010-1.414L10.586 10 7.293 6.707a1 1 0 011.414-1.414l4 4a1 1 0 010 1.414l-4 4a1 1 0 01-1.414 0z" clip-rule="evenodd"/>
                    </svg>
                </a>
            </div>
        </div>

        <div class="profile-section">
            <h2 class="section-title" th:text="#{profile.title}">Информация о профиле</h2>

            <div style="display: grid; gap: var(--space-4);">
                <div style="display: flex; justify-content: space-between; padding: var(--space-3) 0; border-bottom: 1px solid var(--gray-100);">
                    <span style="color: var(--gray-600); font-weight: 500;" th:text="#{user.name}">Имя</span>
                    <span style="color: var(--gray-900); font-weight: 600;" th:text="${user.name}">Имя</span>
                </div>
                <div style="display: flex; justify-content: space-between; padding: var(--space-3) 0; border-bottom: 1px solid var(--gray-100);">
                    <span style="color: var(--gray-600); font-weight: 500;" th:text="#{user.last.name}">Фамилия</span>
                    <span style="color: var(--gray-900); font-weight: 600;" th:text="${user.lastName}">Фамилия</span>
                </div>
            </div>

            <div class="profile-actions">
                <a href="/products/main" class="btn btn-primary">
                    <svg width="20" height="20" fill="currentColor" viewBox="0 0 20 20" style="margin-right: var(--space-2);">
                        <path d="M3 1a1 1 0 000 2h1.22l.305 1.222a.997.997 0 00.01.042l1.358 5.43-.893.892C3.74 11.846 4.632 14 6.414 14H15a1 1 0 000-2H6.414l1-1H14a1 1 0 00.894-.553l3-6A1 1 0 0017 3H6.28l-.31-1.243A1 1 0 005 1H3zM16 16.5a1.5 1.5 0 11-3 0 1.5 1.5 0 013 0zM6.5 18a1.5 1.5 0 100-3 1.5 1.5 0 000 3z"/>
                    </svg>
                    <span th:text="#{cart.continue.shopping}">Продолжить покупки</span>
                </a>
                <button type="button" class="btn btn-logout" onclick="document.getElementById('logout-form').submit();">
                    <svg width="20" height="20" fill="currentColor" viewBox="0 0 20 20" style="margin-right: var(--space-2);">
                        <path fill-rule="evenodd" d="M3 3a1 1 0 00-1 1v12a1 1 0 102 0V4a1 1 0 00-1-1zm10.293 9.293a1 1 0 001.414 1.414l3-3a1 1 0 000-1.414l-3-3a1 1 0 10-1.414 1.414L14.586 9H7a1 1 0 100 2h7.586l-1.293 1.293z" clip-rule="evenodd"/>
                    </svg>
                    <span th:text="#{menu.logout}">Выйти</span>
                </button>
            </div>

            <form id="logout-form" method="post" th:action="@{/logout}" style="display: none;">
                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />
            </form>
        </div>
    </main>

    <script src="/js/main.js"></script>
</body>
</html>
