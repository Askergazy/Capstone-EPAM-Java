<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security"
      lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="#{menu.cart} + ' - Online Shop'">Корзина - Online Shop</title>
    <link rel="stylesheet" href="/css/variables.css">
    <link rel="stylesheet" href="/css/base.css">
    <link rel="stylesheet" href="/css/header.css">
    <link rel="stylesheet" href="/css/components.css">
    <style>
        .cart-container {
            max-width: 1200px;
            margin: 0 auto;
            padding: var(--space-8) var(--space-4);
        }

        .cart-header {
            margin-bottom: var(--space-8);
        }

        .cart-title {
            font-size: var(--text-3xl);
            font-weight: 700;
            color: var(--gray-900);
            margin-bottom: var(--space-2);
        }

        .cart-empty {
            text-align: center;
            padding: var(--space-16) var(--space-4);
        }

        .cart-empty-icon {
            width: 80px;
            height: 80px;
            margin: 0 auto var(--space-4);
            background: var(--gray-100);
            border-radius: var(--radius-full);
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--gray-400);
        }

        .cart-empty-title {
            font-size: var(--text-xl);
            font-weight: 600;
            color: var(--gray-900);
            margin-bottom: var(--space-2);
        }

        .cart-empty-text {
            color: var(--gray-600);
            margin-bottom: var(--space-6);
        }

        .cart-grid {
            display: grid;
            grid-template-columns: 1fr auto;
            gap: var(--space-8);
            align-items: start;
        }

        @media (max-width: 768px) {
            .cart-grid {
                grid-template-columns: 1fr;
            }
        }

        .cart-items {
            display: flex;
            flex-direction: column;
            gap: var(--space-4);
        }

        .cart-item {
            background: var(--white);
            border: 1px solid var(--gray-200);
            border-radius: var(--radius-lg);
            padding: var(--space-4);
            display: grid;
            grid-template-columns: auto 1fr auto;
            gap: var(--space-4);
            align-items: center;
            transition: all var(--transition-base);
        }

        .cart-item:hover {
            box-shadow: var(--shadow-md);
        }

        .cart-item-image {
            width: 80px;
            height: 80px;
            border-radius: var(--radius-md);
            object-fit: cover;
            background: var(--gray-100);
        }

        .cart-item-info {
            flex: 1;
        }

        .cart-item-name {
            font-size: var(--text-lg);
            font-weight: 600;
            color: var(--gray-900);
            margin-bottom: var(--space-2);
            text-decoration: none;
            display: block;
        }

        .cart-item-name:hover {
            color: var(--primary-color);
        }

        .cart-item-price {
            font-size: var(--text-base);
            color: var(--gray-600);
            margin-bottom: var(--space-3);
        }

        .cart-item-price-value {
            font-weight: 600;
            color: var(--gray-900);
        }

        .cart-item-controls {
            display: flex;
            align-items: center;
            gap: var(--space-2);
        }

        .quantity-control {
            display: flex;
            align-items: center;
            gap: var(--space-2);
            background: var(--gray-50);
            border-radius: var(--radius-md);
            padding: var(--space-1);
        }

        .quantity-btn {
            background: var(--white);
            border: 1px solid var(--gray-300);
            border-radius: var(--radius-sm);
            width: 32px;
            height: 32px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all var(--transition-fast);
        }

        .quantity-btn:hover {
            background: var(--primary-color);
            border-color: var(--primary-color);
            color: var(--white);
        }

        .quantity-value {
            min-width: 40px;
            text-align: center;
            font-weight: 600;
            color: var(--gray-900);
        }

        .cart-item-actions {
            display: flex;
            flex-direction: column;
            gap: var(--space-2);
            align-items: flex-end;
        }

        .cart-item-total {
            font-size: var(--text-xl);
            font-weight: 700;
            color: var(--gray-900);
        }

        .btn-delete {
            background: none;
            border: none;
            color: var(--danger-color);
            cursor: pointer;
            padding: var(--space-2);
            display: flex;
            align-items: center;
            gap: var(--space-1);
            font-size: var(--text-sm);
            transition: all var(--transition-fast);
        }

        .btn-delete:hover {
            color: var(--danger-hover, #dc2626);
        }

        .cart-summary {
            background: var(--white);
            border: 1px solid var(--gray-200);
            border-radius: var(--radius-lg);
            padding: var(--space-6);
            position: sticky;
            top: 80px;
            min-width: 300px;
        }

        .cart-summary-title {
            font-size: var(--text-xl);
            font-weight: 700;
            color: var(--gray-900);
            margin-bottom: var(--space-4);
            padding-bottom: var(--space-4);
            border-bottom: 1px solid var(--gray-200);
        }

        .cart-summary-row {
            display: flex;
            justify-content: space-between;
            margin-bottom: var(--space-3);
            color: var(--gray-600);
        }

        .cart-summary-total {
            display: flex;
            justify-content: space-between;
            font-size: var(--text-xl);
            font-weight: 700;
            color: var(--gray-900);
            padding-top: var(--space-4);
            margin-top: var(--space-4);
            border-top: 2px solid var(--gray-200);
        }

        .cart-summary-actions {
            margin-top: var(--space-6);
            display: flex;
            flex-direction: column;
            gap: var(--space-3);
        }

        .btn-checkout {
            width: 100%;
        }

        .btn-clear {
            width: 100%;
            background: var(--white);
            color: var(--danger-color);
            border: 1px solid var(--danger-color);
        }

        .btn-clear:hover {
            background: var(--danger-color);
            color: var(--white);
        }
    </style>
</head>
<body>
    <div th:insert="~{fragments/header_example::headerFragment}"></div>

    <main class="cart-container">
        <div class="cart-header">
            <h1 class="cart-title" th:text="#{menu.cart}">Корзина</h1>
        </div>

        <th:block th:if="${cartItems.isEmpty()}">
            <div class="cart-empty">
                <div class="cart-empty-icon">
                    <svg width="48" height="48" fill="currentColor" viewBox="0 0 20 20">
                        <path d="M3 1a1 1 0 000 2h1.22l.305 1.222a.997.997 0 00.01.042l1.358 5.43-.893.892C3.74 11.846 4.632 14 6.414 14H15a1 1 0 000-2H6.414l1-1H14a1 1 0 00.894-.553l3-6A1 1 0 0017 3H6.28l-.31-1.243A1 1 0 005 1H3zM16 16.5a1.5 1.5 0 11-3 0 1.5 1.5 0 013 0zM6.5 18a1.5 1.5 0 100-3 1.5 1.5 0 000 3z"/>
                    </svg>
                </div>
                <h2 class="cart-empty-title" th:text="#{cart.empty}">Ваша корзина пуста</h2>
                <p class="cart-empty-text" th:text="#{cart.continue.shopping}">Добавьте товары, чтобы оформить заказ</p>
                <a href="/products/main" class="btn btn-primary" th:text="#{cart.continue.shopping}">
                    Перейти к покупкам
                </a>
            </div>
        </th:block>

        <th:block th:if="${!cartItems.isEmpty()}">
            <div class="cart-grid">
                <div class="cart-items">
                    <div th:each="cartItem : ${cartItems}" class="cart-item">
                        <div class="cart-item-image">
                            <img th:if="${cartItem.product.image != null}"
                                 th:src="@{'/images/' + ${cartItem.product.image}}"
                                 th:alt="${cartItem.product.name}"
                                 style="width: 100%; height: 100%; object-fit: cover; border-radius: var(--radius-md);">
                        </div>

                        <div class="cart-item-info">
                            <a th:href="@{/products/view(productId=${cartItem.product.id})}"
                               th:text="${cartItem.product.name}"
                               class="cart-item-name">
                                Товар
                            </a>
                            <div class="cart-item-price">
                                <span th:text="#{cart.unit.price}">Цена</span>: <span class="cart-item-price-value" th:text="${cartItem.product.price} + ' ₸'">0 ₸</span>
                            </div>
                            <div class="cart-item-controls">
                                <div class="quantity-control">
                                    <form th:action="@{/cart/decreaseQuantity}" method="post" style="display: inline;">
                                        <input type="hidden" name="userId" th:value="${user.id}"/>
                                        <input type="hidden" name="product" th:value="${cartItem.id}"/>
                                        <button type="submit" class="quantity-btn">
                                            <svg width="16" height="16" fill="currentColor" viewBox="0 0 20 20">
                                                <path fill-rule="evenodd" d="M3 10a1 1 0 011-1h12a1 1 0 110 2H4a1 1 0 01-1-1z" clip-rule="evenodd"/>
                                            </svg>
                                        </button>
                                    </form>

                                    <span class="quantity-value" th:text="${cartItem.quantity}">1</span>

                                    <form th:action="@{/cart/increaseQuantity}" method="post" style="display: inline;">
                                        <input type="hidden" name="userId" th:value="${user.id}"/>
                                        <input type="hidden" name="product" th:value="${cartItem.id}"/>
                                        <button type="submit" class="quantity-btn">
                                            <svg width="16" height="16" fill="currentColor" viewBox="0 0 20 20">
                                                <path fill-rule="evenodd" d="M10 3a1 1 0 011 1v5h5a1 1 0 110 2h-5v5a1 1 0 11-2 0v-5H4a1 1 0 110-2h5V4a1 1 0 011-1z" clip-rule="evenodd"/>
                                            </svg>
                                        </button>
                                    </form>
                                </div>
                            </div>
                        </div>

                        <div class="cart-item-actions">
                            <div class="cart-item-total" th:text="${cartItem.quantity * cartItem.product.price} + ' ₸'">
                                0 ₸
                            </div>
                            <a th:href="@{/cart/delete(cartItemId=${cartItem.id})}" class="btn-delete">
                                <svg width="16" height="16" fill="currentColor" viewBox="0 0 20 20">
                                    <path fill-rule="evenodd" d="M9 2a1 1 0 00-.894.553L7.382 4H4a1 1 0 000 2v10a2 2 0 002 2h8a2 2 0 002-2V6a1 1 0 100-2h-3.382l-.724-1.447A1 1 0 0011 2H9zM7 8a1 1 0 012 0v6a1 1 0 11-2 0V8zm5-1a1 1 0 00-1 1v6a1 1 0 102 0V8a1 1 0 00-1-1z" clip-rule="evenodd"/>
                                </svg>
                                <span th:text="#{cart.remove}">Удалить</span>
                            </a>
                        </div>
                    </div>
                </div>

                <div class="cart-summary">
                    <h3 class="cart-summary-title" th:text="#{cart.total}">Итого</h3>
                    <div class="cart-summary-row">
                        <span><span th:text="#{menu.products}">Товары</span> (<span th:text="${cartItems.size()}">0</span>)</span>
                        <span th:text="${sum} + ' ₸'">0 ₸</span>
                    </div>
                    <div class="cart-summary-total">
                        <span th:text="#{cart.total} + ':'">Итого:</span>
                        <span th:text="${sum} + ' ₸'">0 ₸</span>
                    </div>

                    <div class="cart-summary-actions">
                        <form th:action="@{/order}" method="get">
                            <button type="submit" class="btn btn-primary btn-checkout" th:text="#{cart.checkout}">
                                Оформить заказ
                            </button>
                        </form>

                        <form th:action="@{/cart/deleteAll}" method="post">
                            <input type="hidden" name="userId" th:value="${user.id}"/>
                            <button type="submit" class="btn btn-clear" th:text="#{cart.clear}">
                                Очистить корзину
                            </button>
                        </form>
                    </div>
                </div>
            </div>
        </th:block>
    </main>

    <script src="/js/main.js"></script>
</body>
</html>
