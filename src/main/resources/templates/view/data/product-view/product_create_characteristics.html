<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security"
      lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Создать товар - Online Shop</title>
    <link rel="stylesheet" href="/css/variables.css">
    <link rel="stylesheet" href="/css/base.css">
    <link rel="stylesheet" href="/css/header.css">
    <link rel="stylesheet" href="/css/components.css">
</head>
<body>
    <div th:insert="~{fragments/header_example::headerFragment}"></div>

    <main class="form-page-container">
        <div class="form-page-card">
            <h1 class="form-page-title">Создать товар</h1>

            <form th:action="@{/products/createByCategory{id}}"
                  method="post"
                  enctype="multipart/form-data"
                  style="display: flex; flex-direction: column; gap: var(--space-5);">

                <input type="hidden" th:name="categoryId" th:value="${categoryId}">

                <div class="form-group">
                    <label for="name" class="form-label">Название товара</label>
                    <input type="text"
                           id="name"
                           name="name"
                           class="form-input"
                           placeholder="Введите название товара"
                           required>
                </div>

                <div class="form-group">
                    <label for="price" class="form-label">Цена (₸)</label>
                    <input type="number"
                           id="price"
                           name="price"
                           class="form-input"
                           placeholder="Введите цену"
                           min="0"
                           required>
                </div>

                <th:block th:if="${!#lists.isEmpty(characteristics)}">
                    <div style="padding: var(--space-4); background: var(--gray-50); border-radius: var(--radius-lg);">
                        <p class="form-label" style="margin-bottom: var(--space-4);">Характеристики</p>
                        <div th:each="characteristic : ${characteristics}" class="form-group" style="margin-bottom: var(--space-3);">
                            <label class="form-label" th:text="${characteristic.name}">Характеристика</label>
                            <input type="text"
                                   name="values"
                                   class="form-input"
                                   placeholder="Введите значение">
                        </div>
                    </div>
                </th:block>

                <div class="form-group">
                    <label for="image" class="form-label">Изображение товара</label>
                    <input type="file"
                           id="image"
                           name="image"
                           class="form-input"
                           accept="image/*">
                </div>

                <div style="display: flex; gap: var(--space-3); justify-content: flex-end;">
                    <a href="/products/create" class="btn btn-secondary">Отмена</a>
                    <button type="submit" class="btn btn-primary">
                        <svg width="20" height="20" fill="currentColor" viewBox="0 0 20 20" style="margin-right: var(--space-2);">
                            <path fill-rule="evenodd" d="M10 3a1 1 0 011 1v5h5a1 1 0 110 2h-5v5a1 1 0 11-2 0v-5H4a1 1 0 110-2h5V4a1 1 0 011-1z" clip-rule="evenodd"/>
                        </svg>
                        Создать товар
                    </button>
                </div>
            </form>
        </div>
    </main>

    <script src="/js/main.js"></script>
</body>
</html>
