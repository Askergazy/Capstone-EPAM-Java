<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security"
      lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${!products.isEmpty() ? products.get(0).category.name + ' - Online Shop' : 'Категория - Online Shop'}">Категория - Online Shop</title>
    <link rel="stylesheet" href="/css/variables.css">
    <link rel="stylesheet" href="/css/base.css">
    <link rel="stylesheet" href="/css/header.css">
    <link rel="stylesheet" href="/css/products.css">
    <link rel="stylesheet" href="/css/components.css">
</head>
<body>
    <div th:insert="~{fragments/header_example::headerFragment}"></div>

    <main class="products-container">
        <div class="container">
            <div class="products-header" th:if="${!products.isEmpty()}">
                <h1 class="products-title" th:text="${products.get(0).category.name}">Категория</h1>
                <p class="products-subtitle"><span th:text="#{catalog.found}">Найдено товаров</span>: <span th:text="${products.size()}">0</span></p>
            </div>

            <div th:if="${products.isEmpty()}" class="empty-state">
                <div class="empty-state-icon">
                    <svg width="64" height="64" fill="currentColor" viewBox="0 0 20 20">
                        <path fill-rule="evenodd" d="M4 3a2 2 0 00-2 2v10a2 2 0 002 2h12a2 2 0 002-2V5a2 2 0 00-2-2H4zm12 12H4l4-8 3 6 2-4 3 6z" clip-rule="evenodd"/>
                    </svg>
                </div>
                <h2 class="empty-state-title" th:text="#{catalog.empty.title}">Товары не найдены</h2>
                <p class="empty-state-text" th:text="#{catalog.empty.category}">В этой категории пока нет товаров</p>
                <a href="/products/main" class="btn btn-primary" style="margin-top: var(--space-4);" th:text="#{catalog.back}">
                    Вернуться к каталогу
                </a>
            </div>

            <div class="product-grid" th:if="${!products.isEmpty()}">
                <article th:each="product : ${products}" class="product-card animate-on-scroll">
                    <div class="product-image-wrapper">
                        <a th:href="@{/products/view(productId=${product.id})}">
                            <img class="product-image"
                                 th:if="${product.image != null}"
                                 th:src="@{'/images/' + ${product.image}}"
                                 th:alt="${product.name}"
                                 loading="lazy">
                        </a>
                    </div>
                    <div class="product-body">
                        <div class="product-category" th:text="${product.category?.name}">Категория</div>
                        <h2 class="product-name">
                            <a th:href="@{/products/view(productId=${product.id})}"
                               th:text="${product.name}">
                                Название товара
                            </a>
                        </h2>
                        <div class="product-footer">
                            <div class="product-price">
                                <span th:text="${product.price}">0</span>
                                <span class="product-price-currency">₸</span>
                            </div>

                            <a th:href="@{/cart/add(productId=${product.id})}"
                               class="btn-add-to-cart"
                               th:title="#{product.add.to.cart}">
                                <svg width="20" height="20" fill="currentColor" viewBox="0 0 20 20">
                                    <path d="M3 1a1 1 0 000 2h1.22l.305 1.222a.997.997 0 00.01.042l1.358 5.43-.893.892C3.74 11.846 4.632 14 6.414 14H15a1 1 0 000-2H6.414l1-1H14a1 1 0 00.894-.553l3-6A1 1 0 0017 3H6.28l-.31-1.243A1 1 0 005 1H3zM16 16.5a1.5 1.5 0 11-3 0 1.5 1.5 0 013 0zM6.5 18a1.5 1.5 0 100-3 1.5 1.5 0 000 3z"/>
                                </svg>
                                <span th:text="#{catalog.add.to.cart}">В корзину</span>
                            </a>
                        </div>
                    </div>
                </article>
            </div>
        </div>
    </main>

    <script src="/js/main.js"></script>
</body>
</html>
