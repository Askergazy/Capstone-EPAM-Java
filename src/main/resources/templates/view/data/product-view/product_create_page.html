<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security"
      lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Создать товар - Online Shop</title>
    <link rel="stylesheet" href="/css/variables.css">
    <link rel="stylesheet" href="/css/base.css">
    <link rel="stylesheet" href="/css/header.css">
    <link rel="stylesheet" href="/css/components.css">
</head>
<body>
    <div th:insert="~{fragments/header_example::headerFragment}"></div>

    <main class="form-page-container">
        <div class="form-page-card">
            <h1 class="form-page-title">Создать новый товар</h1>

            <div class="form-group">
                <label for="category-select" class="form-label">Выберите категорию</label>
                <select id="category-select"
                        class="form-select"
                        onchange="if(this.value) location.href = '/products/createByCategory' + this.value;">
                    <option value="" selected disabled>Выберите категорию</option>
                    <option th:each="category : ${categories}"
                            th:value="${category.id}"
                            th:text="${category.name}">
                        Категория
                    </option>
                </select>
            </div>

            <div style="text-align: center; margin-top: var(--space-6);">
                <a href="/products/admin" class="btn btn-secondary">
                    <svg width="20" height="20" fill="currentColor" viewBox="0 0 20 20" style="margin-right: var(--space-2);">
                        <path fill-rule="evenodd" d="M9.707 16.707a1 1 0 01-1.414 0l-6-6a1 1 0 010-1.414l6-6a1 1 0 011.414 1.414L5.414 9H17a1 1 0 110 2H5.414l4.293 4.293a1 1 0 010 1.414z" clip-rule="evenodd"/>
                    </svg>
                    Назад
                </a>
            </div>
        </div>
    </main>

    <script src="/js/main.js"></script>
</body>
</html>
