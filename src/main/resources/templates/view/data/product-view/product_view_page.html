<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security"
      lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${product.name} + ' - Online Shop'">Товар - Online Shop</title>
    <link rel="stylesheet" href="/css/variables.css">
    <link rel="stylesheet" href="/css/base.css">
    <link rel="stylesheet" href="/css/header.css">
    <link rel="stylesheet" href="/css/components.css">
    <style>
        .product-view-container {
            max-width: 1200px;
            margin: 0 auto;
            padding: var(--space-8) var(--space-4);
        }

        .product-detail {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: var(--space-8);
            margin-bottom: var(--space-12);
        }

        @media (max-width: 768px) {
            .product-detail {
                grid-template-columns: 1fr;
            }
        }

        .product-image-section {
            position: sticky;
            top: 100px;
            align-self: start;
        }

        .product-image-main {
            width: 100%;
            aspect-ratio: 1;
            border-radius: var(--radius-lg);
            object-fit: cover;
            background: var(--gray-100);
            box-shadow: var(--shadow-md);
        }

        .product-info-section {
            display: flex;
            flex-direction: column;
            gap: var(--space-6);
        }

        .product-title {
            font-size: var(--text-3xl);
            font-weight: 700;
            color: var(--gray-900);
        }

        .product-category {
            display: inline-block;
            padding: var(--space-2) var(--space-3);
            background: var(--primary-light);
            color: var(--primary-color);
            border-radius: var(--radius-full);
            font-size: var(--text-sm);
            font-weight: 600;
        }

        .product-price-section {
            padding: var(--space-4);
            background: var(--gray-50);
            border-radius: var(--radius-lg);
        }

        .product-price {
            font-size: var(--text-4xl);
            font-weight: 700;
            color: var(--gray-900);
        }

        .characteristics-section {
            padding: var(--space-6);
            background: var(--white);
            border: 1px solid var(--gray-200);
            border-radius: var(--radius-lg);
        }

        .characteristics-title {
            font-size: var(--text-xl);
            font-weight: 700;
            color: var(--gray-900);
            margin-bottom: var(--space-4);
        }

        .characteristic-item {
            display: flex;
            justify-content: space-between;
            padding: var(--space-3) 0;
            border-bottom: 1px solid var(--gray-100);
        }

        .characteristic-item:last-child {
            border-bottom: none;
        }

        .characteristic-name {
            color: var(--gray-600);
            font-weight: 500;
        }

        .characteristic-value {
            color: var(--gray-900);
            font-weight: 600;
        }

        .btn-add-to-cart {
            width: 100%;
            padding: var(--space-4);
            font-size: var(--text-lg);
            font-weight: 600;
        }

        .reviews-section {
            margin-top: var(--space-12);
        }

        .reviews-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: var(--space-6);
        }

        .reviews-title {
            font-size: var(--text-2xl);
            font-weight: 700;
            color: var(--gray-900);
        }

        .average-rating {
            display: flex;
            align-items: center;
            gap: var(--space-2);
            padding: var(--space-3) var(--space-4);
            background: var(--warning-light, #fef3c7);
            border-radius: var(--radius-lg);
        }

        .rating-value {
            font-size: var(--text-xl);
            font-weight: 700;
            color: var(--warning-color);
        }

        .review-form-section {
            padding: var(--space-6);
            background: var(--gray-50);
            border-radius: var(--radius-lg);
            margin-bottom: var(--space-8);
        }

        .review-form-title {
            font-size: var(--text-lg);
            font-weight: 600;
            color: var(--gray-900);
            margin-bottom: var(--space-4);
        }

        .review-form {
            display: flex;
            flex-direction: column;
            gap: var(--space-4);
        }

        .reviews-list {
            display: flex;
            flex-direction: column;
            gap: var(--space-4);
        }

        .review-item {
            padding: var(--space-6);
            background: var(--white);
            border: 1px solid var(--gray-200);
            border-radius: var(--radius-lg);
        }

        .review-header {
            display: flex;
            justify-content: space-between;
            align-items: start;
            margin-bottom: var(--space-3);
        }

        .review-author {
            font-weight: 600;
            color: var(--gray-900);
        }

        .review-rating {
            display: flex;
            align-items: center;
            gap: var(--space-1);
            color: var(--warning-color);
            font-weight: 600;
        }

        .review-date {
            font-size: var(--text-sm);
            color: var(--gray-500);
            margin-bottom: var(--space-3);
        }

        .review-text {
            color: var(--gray-700);
            line-height: 1.6;
        }

        .no-reviews {
            text-align: center;
            padding: var(--space-12) var(--space-4);
            color: var(--gray-500);
        }

        .auth-prompt {
            text-align: center;
            padding: var(--space-6);
            background: var(--primary-light);
            border-radius: var(--radius-lg);
        }

        .review-submitted {
            padding: var(--space-4);
            background: var(--success-light, #d1fae5);
            color: var(--success-color);
            border-radius: var(--radius-lg);
            text-align: center;
            font-weight: 600;
        }
    </style>
</head>
<body>
    <div th:insert="~{fragments/header_example::headerFragment}"></div>

    <main class="product-view-container">
        <div class="product-detail">
            <div class="product-image-section">
                <img class="product-image-main"
                     th:if="${product.image != null}"
                     th:src="@{'/images/' + ${product.image}}"
                     th:alt="${product.name}">
            </div>

            <div class="product-info-section">
                <div>
                    <span class="product-category" th:text="${product.category.name}">Категория</span>
                </div>

                <h1 class="product-title" th:text="${product.name}">Название товара</h1>

                <div class="product-price-section">
                    <div class="product-price" th:text="${product.price} + ' ₸'">0 ₸</div>
                </div>

                <div class="characteristics-section">
                    <h3 class="characteristics-title" th:text="#{product.characteristics}">Характеристики</h3>
                    <div class="characteristic-item" th:each="value : ${product.characteristicValues}">
                        <span class="characteristic-name" th:text="${value.characteristic.name}">Характеристика</span>
                        <span class="characteristic-value" th:text="${value.value}">Значение</span>
                    </div>
                </div>

                <a th:href="@{/cart/add(productId=${product.id})}" class="btn btn-primary btn-add-to-cart">
                    <svg width="20" height="20" fill="currentColor" viewBox="0 0 20 20" style="margin-right: var(--space-2);">
                        <path d="M3 1a1 1 0 000 2h1.22l.305 1.222a.997.997 0 00.01.042l1.358 5.43-.893.892C3.74 11.846 4.632 14 6.414 14H15a1 1 0 000-2H6.414l1-1H14a1 1 0 00.894-.553l3-6A1 1 0 0017 3H6.28l-.31-1.243A1 1 0 005 1H3zM16 16.5a1.5 1.5 0 11-3 0 1.5 1.5 0 013 0zM6.5 18a1.5 1.5 0 100-3 1.5 1.5 0 000 3z"/>
                    </svg>
                    <span th:text="#{product.add.to.cart}">Добавить в корзину</span>
                </a>
            </div>
        </div>

        <section class="reviews-section">
            <div class="reviews-header">
                <h2 class="reviews-title" th:text="#{review.title}">Отзывы</h2>
                <div class="average-rating" th:if="${!reviewIsEmpty}">
                    <svg width="24" height="24" fill="currentColor" viewBox="0 0 20 20">
                        <path d="M9.049 2.927c.3-.921 1.603-.921 1.902 0l1.07 3.292a1 1 0 00.95.69h3.462c.969 0 1.371 1.24.588 1.81l-2.8 2.034a1 1 0 00-.364 1.118l1.07 3.292c.3.921-.755 1.688-1.54 1.118l-2.8-2.034a1 1 0 00-1.175 0l-2.8 2.034c-.784.57-1.838-.197-1.539-1.118l1.07-3.292a1 1 0 00-.364-1.118L2.98 8.72c-.783-.57-.38-1.81.588-1.81h3.461a1 1 0 00.951-.69l1.07-3.292z"/>
                    </svg>
                    <span class="rating-value" th:text="${avg}">0.0</span>
                </div>
            </div>

            <div th:if="${userIsEmpty}" class="auth-prompt">
                <p style="margin-bottom: var(--space-4); color: var(--gray-700);">
                    <b th:text="#{review.auth.required}">Авторизуйтесь, чтобы оставить отзыв</b>
                </p>
                <a href="/login" class="btn btn-primary" th:text="#{menu.login}">
                    Войти
                </a>
            </div>

            <div th:if="${!userIsEmpty and !check}" class="review-submitted" th:text="#{review.submitted}">
                Ваш отзыв успешно отправлен и ожидает модерации
            </div>

            <div th:if="${check}" class="review-form-section">
                <h3 class="review-form-title" th:text="#{review.leave}">Оставить отзыв</h3>
                <form method="post" th:action="@{/review}" class="review-form">
                    <input type="hidden" name="productId" th:value="${product.id}"/>

                    <div class="form-group">
                        <label for="rating" class="form-label" th:text="#{review.rating} + ' (1-5)'">Оценка (1-5)</label>
                        <input type="number"
                               id="rating"
                               name="rating"
                               class="form-input"
                               min="1"
                               max="5"
                               required
                               th:placeholder="#{review.rating.placeholder}">
                    </div>

                    <div class="form-group">
                        <label for="reviewText" class="form-label" th:text="#{review.text}">Ваш отзыв</label>
                        <textarea id="reviewText"
                                  name="reviewText"
                                  class="form-input"
                                  rows="4"
                                  required
                                  th:placeholder="#{review.text.placeholder}"></textarea>
                    </div>

                    <button type="submit" class="btn btn-primary" th:text="#{review.submit}">
                        Отправить отзыв
                    </button>
                </form>
            </div>

            <div th:if="${reviewIsEmpty}" class="no-reviews">
                <p th:text="#{review.no.reviews}">Отзывов пока нет. Будьте первым!</p>
            </div>

            <div class="reviews-list">
                <div th:each="review : ${product.reviews}" class="review-item" th:if="${review.status}">
                    <div class="review-header">
                        <span class="review-author" th:text="${review.user.name}">Пользователь</span>
                        <div class="review-rating">
                            <svg width="20" height="20" fill="currentColor" viewBox="0 0 20 20">
                                <path d="M9.049 2.927c.3-.921 1.603-.921 1.902 0l1.07 3.292a1 1 0 00.95.69h3.462c.969 0 1.371 1.24.588 1.81l-2.8 2.034a1 1 0 00-.364 1.118l1.07 3.292c.3.921-.755 1.688-1.54 1.118l-2.8-2.034a1 1 0 00-1.175 0l-2.8 2.034c-.784.57-1.838-.197-1.539-1.118l1.07-3.292a1 1 0 00-.364-1.118L2.98 8.72c-.783-.57-.38-1.81.588-1.81h3.461a1 1 0 00.951-.69l1.07-3.292z"/>
                            </svg>
                            <span th:text="${review.rating}">5</span>
                        </div>
                    </div>
                    <div class="review-date" th:text="${review.reviewDate}">Дата</div>
                    <p class="review-text" th:text="${review.reviewText}">Текст отзыва</p>
                </div>
            </div>
        </section>
    </main>

    <script src="/js/main.js"></script>
</body>
</html>
