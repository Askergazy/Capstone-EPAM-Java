<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security"
      lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Товар удален - Online Shop</title>
    <link rel="stylesheet" href="/css/variables.css">
    <link rel="stylesheet" href="/css/base.css">
    <link rel="stylesheet" href="/css/header.css">
    <link rel="stylesheet" href="/css/components.css">
</head>
<body>
    <div th:insert="~{fragments/header_example::headerFragment}"></div>

    <main class="form-page-container">
        <div class="form-page-card" style="text-align: center;">
            <div style="width: 80px; height: 80px; margin: 0 auto var(--space-6); background: #d1fae5; border-radius: var(--radius-full); display: flex; align-items: center; justify-content: center;">
                <svg width="40" height="40" fill="#10b981" viewBox="0 0 20 20">
                    <path fill-rule="evenodd" d="M10 18a8 8 0 100-16 8 8 0 000 16zm3.707-9.293a1 1 0 00-1.414-1.414L9 10.586 7.707 9.293a1 1 0 00-1.414 1.414l2 2a1 1 0 001.414 0l4-4z" clip-rule="evenodd"/>
                </svg>
            </div>

            <h1 class="form-page-title">Товар успешно удален</h1>
            <p style="color: var(--gray-600); margin-bottom: var(--space-6);">
                Товар был удален из каталога
            </p>

            <a href="/products/admin" class="btn btn-primary">
                <svg width="20" height="20" fill="currentColor" viewBox="0 0 20 20" style="margin-right: var(--space-2);">
                    <path fill-rule="evenodd" d="M9.707 16.707a1 1 0 01-1.414 0l-6-6a1 1 0 010-1.414l6-6a1 1 0 011.414 1.414L5.414 9H17a1 1 0 110 2H5.414l4.293 4.293a1 1 0 010 1.414z" clip-rule="evenodd"/>
                </svg>
                Вернуться к панели
            </a>
        </div>
    </main>

    <script src="/js/main.js"></script>
</body>
</html>
