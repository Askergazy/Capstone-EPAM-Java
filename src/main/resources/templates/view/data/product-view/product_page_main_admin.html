<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security"
      lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Панель администратора - Online Shop</title>
    <link rel="stylesheet" href="/css/variables.css">
    <link rel="stylesheet" href="/css/base.css">
    <link rel="stylesheet" href="/css/header.css">
    <link rel="stylesheet" href="/css/components.css">
</head>
<body>
    <div th:replace="~{fragments/header_example::headerFragment}"></div>

    <main class="admin-container">
        <div class="admin-header">
            <h1 class="admin-title">Панель администратора</h1>
            <p class="admin-subtitle">Управление товарами, отзывами и заказами</p>
        </div>

        <div class="admin-actions">
            <a th:href="@{/products/create}" class="admin-card">
                <div class="admin-card-icon">
                    <svg width="24" height="24" fill="currentColor" viewBox="0 0 20 20">
                        <path fill-rule="evenodd" d="M10 3a1 1 0 011 1v5h5a1 1 0 110 2h-5v5a1 1 0 11-2 0v-5H4a1 1 0 110-2h5V4a1 1 0 011-1z" clip-rule="evenodd"/>
                    </svg>
                </div>
                <span class="admin-card-text">Создать товар</span>
            </a>

            <a th:href="@{/review/moderate}" class="admin-card">
                <div class="admin-card-icon">
                    <svg width="24" height="24" fill="currentColor" viewBox="0 0 20 20">
                        <path fill-rule="evenodd" d="M18 13V5a2 2 0 00-2-2H4a2 2 0 00-2 2v8a2 2 0 002 2h3l3 3 3-3h3a2 2 0 002-2zM5 7a1 1 0 011-1h8a1 1 0 110 2H6a1 1 0 01-1-1zm1 3a1 1 0 100 2h3a1 1 0 100-2H6z" clip-rule="evenodd"/>
                    </svg>
                </div>
                <span class="admin-card-text">Модерация отзывов</span>
            </a>

            <a th:href="@{/order/moderate}" class="admin-card">
                <div class="admin-card-icon">
                    <svg width="24" height="24" fill="currentColor" viewBox="0 0 20 20">
                        <path d="M4 4a2 2 0 012-2h4.586A2 2 0 0112 2.586L15.414 6A2 2 0 0116 7.414V16a2 2 0 01-2 2H6a2 2 0 01-2-2V4zm2 6a1 1 0 011-1h6a1 1 0 110 2H7a1 1 0 01-1-1zm1 3a1 1 0 100 2h6a1 1 0 100-2H7z"/>
                    </svg>
                </div>
                <span class="admin-card-text">Модерация заказов</span>
            </a>
        </div>

        <div class="order-card">
            <h2 class="order-card-title">Все товары</h2>

            <div class="admin-product-list">
                <div th:each="product : ${productList}" class="admin-product-item">
                    <a th:href="@{/products/view(productId=${product.id})}">
                        <img th:if="${product.image != null}"
                             th:src="@{'/images/' + ${product.image}}"
                             alt="Product Image"
                             class="admin-product-image">
                        <div th:if="${product.image == null}" class="admin-product-image" style="display: flex; align-items: center; justify-content: center; color: var(--gray-400);">
                            <svg width="32" height="32" fill="currentColor" viewBox="0 0 20 20">
                                <path fill-rule="evenodd" d="M4 3a2 2 0 00-2 2v10a2 2 0 002 2h12a2 2 0 002-2V5a2 2 0 00-2-2H4zm12 12H4l4-8 3 6 2-4 3 6z" clip-rule="evenodd"/>
                            </svg>
                        </div>
                    </a>

                    <div class="admin-product-info">
                        <a th:href="@{/products/view(productId=${product.id})}"
                           th:text="${product.name}"
                           class="admin-product-name">
                            Название товара
                        </a>
                        <span class="admin-product-price" th:text="${product.price} + ' ₸'">0 ₸</span>
                    </div>

                    <div class="admin-product-buttons">
                        <a th:href="@{/cart/add(productId=${product.id})}"
                           class="btn-icon-primary"
                           title="Добавить в корзину">
                            <svg width="18" height="18" fill="currentColor" viewBox="0 0 20 20">
                                <path d="M3 1a1 1 0 000 2h1.22l.305 1.222a.997.997 0 00.01.042l1.358 5.43-.893.892C3.74 11.846 4.632 14 6.414 14H15a1 1 0 000-2H6.414l1-1H14a1 1 0 00.894-.553l3-6A1 1 0 0017 3H6.28l-.31-1.243A1 1 0 005 1H3zM16 16.5a1.5 1.5 0 11-3 0 1.5 1.5 0 013 0zM6.5 18a1.5 1.5 0 100-3 1.5 1.5 0 000 3z"/>
                            </svg>
                        </a>
                        <a th:href="@{/products/update(productId=${product.id})}"
                           class="btn-icon-warning"
                           title="Редактировать">
                            <svg width="18" height="18" fill="currentColor" viewBox="0 0 20 20">
                                <path d="M13.586 3.586a2 2 0 112.828 2.828l-.793.793-2.828-2.828.793-.793zM11.379 5.793L3 14.172V17h2.828l8.38-8.379-2.83-2.828z"/>
                            </svg>
                        </a>
                        <a th:href="@{/products/delete(productId=${product.id})}"
                           class="btn-icon-danger"
                           title="Удалить">
                            <svg width="18" height="18" fill="currentColor" viewBox="0 0 20 20">
                                <path fill-rule="evenodd" d="M9 2a1 1 0 00-.894.553L7.382 4H4a1 1 0 000 2v10a2 2 0 002 2h8a2 2 0 002-2V6a1 1 0 100-2h-3.382l-.724-1.447A1 1 0 0011 2H9zM7 8a1 1 0 012 0v6a1 1 0 11-2 0V8zm5-1a1 1 0 00-1 1v6a1 1 0 102 0V8a1 1 0 00-1-1z" clip-rule="evenodd"/>
                            </svg>
                        </a>
                    </div>
                </div>
            </div>

            <div th:if="${#lists.isEmpty(productList)}" class="empty-state">
                <div class="empty-state-icon">
                    <svg width="64" height="64" fill="currentColor" viewBox="0 0 20 20">
                        <path fill-rule="evenodd" d="M4 3a2 2 0 00-2 2v10a2 2 0 002 2h12a2 2 0 002-2V5a2 2 0 00-2-2H4zm12 12H4l4-8 3 6 2-4 3 6z" clip-rule="evenodd"/>
                    </svg>
                </div>
                <h2 class="empty-state-title">Нет товаров</h2>
                <p class="empty-state-text">Добавьте первый товар</p>
                <a th:href="@{/products/create}" class="btn btn-primary" style="margin-top: var(--space-4);">
                    Создать товар
                </a>
            </div>
        </div>
    </main>

    <script src="/js/main.js"></script>
</body>
</html>
