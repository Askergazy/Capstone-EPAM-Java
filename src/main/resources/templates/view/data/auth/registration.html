<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="#{auth.register.title} + ' - Online Shop'">Регистрация - Online Shop</title>
    <link rel="stylesheet" href="/css/variables.css">
    <link rel="stylesheet" href="/css/base.css">
    <link rel="stylesheet" href="/css/components.css">
    <style>
        body {
            background: linear-gradient(135deg, var(--primary-light) 0%, var(--white) 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: var(--space-4);
        }

        .auth-container {
            background: var(--white);
            padding: var(--space-8);
            border-radius: var(--radius-lg);
            box-shadow: var(--shadow-xl);
            width: 100%;
            max-width: 480px;
        }

        .auth-header {
            text-align: center;
            margin-bottom: var(--space-8);
        }

        .auth-logo {
            width: 64px;
            height: 64px;
            margin: 0 auto var(--space-4);
            background: var(--primary-color);
            border-radius: var(--radius-full);
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--white);
            font-size: var(--text-3xl);
            font-weight: 700;
        }

        .auth-title {
            font-size: var(--text-2xl);
            font-weight: 700;
            color: var(--gray-900);
            margin-bottom: var(--space-2);
        }

        .auth-subtitle {
            color: var(--gray-600);
            font-size: var(--text-sm);
        }

        .auth-form {
            display: flex;
            flex-direction: column;
            gap: var(--space-5);
        }

        .form-group {
            display: flex;
            flex-direction: column;
            gap: var(--space-2);
        }

        .form-label {
            font-size: var(--text-sm);
            font-weight: 600;
            color: var(--gray-700);
        }

        .form-input-wrapper {
            position: relative;
        }

        .form-input-icon {
            position: absolute;
            left: 12px;
            top: 50%;
            transform: translateY(-50%);
            color: var(--gray-400);
            pointer-events: none;
        }

        .form-input-with-icon {
            padding-left: 40px;
        }

        .error-message {
            color: var(--danger-color);
            font-size: var(--text-sm);
            display: flex;
            align-items: center;
            gap: var(--space-2);
            margin-top: var(--space-1);
        }

        .error-message svg {
            flex-shrink: 0;
        }

        .btn-primary {
            width: 100%;
            padding: var(--space-3) var(--space-4);
            font-weight: 600;
        }

        .auth-divider {
            text-align: center;
            margin: var(--space-6) 0;
            position: relative;
        }

        .auth-divider::before {
            content: '';
            position: absolute;
            left: 0;
            top: 50%;
            width: 100%;
            height: 1px;
            background: var(--gray-200);
        }

        .auth-divider-text {
            position: relative;
            background: var(--white);
            padding: 0 var(--space-4);
            color: var(--gray-500);
            font-size: var(--text-sm);
        }

        .auth-footer {
            text-align: center;
        }

        .btn-secondary {
            width: 100%;
        }

        .form-input.error {
            border-color: var(--danger-color);
        }

        .form-input.error:focus {
            border-color: var(--danger-color);
            box-shadow: 0 0 0 3px rgba(239, 68, 68, 0.1);
        }
    </style>
</head>
<body>
    <div class="auth-container">
        <div class="auth-header">
            <div class="auth-logo">
                <svg width="32" height="32" fill="currentColor" viewBox="0 0 20 20">
                    <path d="M8 9a3 3 0 100-6 3 3 0 000 6zM8 11a6 6 0 016 6H2a6 6 0 016-6zM16 7a1 1 0 10-2 0v1h-1a1 1 0 100 2h1v1a1 1 0 102 0v-1h1a1 1 0 100-2h-1V7z"/>
                </svg>
            </div>
            <h1 class="auth-title" th:text="#{auth.create.account}">Создать аккаунт</h1>
            <p class="auth-subtitle" th:text="#{auth.register.subtitle}">Заполните форму для регистрации</p>
        </div>

        <form th:method="POST" th:action="@{/auth/registration}" th:object="${user}" class="auth-form">
            <div class="form-group">
                <label for="login" class="form-label"><span th:text="#{user.login}">Логин</span> <span style="color: var(--danger-color);">*</span></label>
                <div class="form-input-wrapper">
                    <svg class="form-input-icon" width="20" height="20" fill="currentColor" viewBox="0 0 20 20">
                        <path fill-rule="evenodd" d="M10 9a3 3 0 100-6 3 3 0 000 6zm-7 9a7 7 0 1114 0H3z" clip-rule="evenodd"/>
                    </svg>
                    <input type="text"
                           th:field="*{login}"
                           id="login"
                           class="form-input form-input-with-icon"
                           th:classappend="${#fields.hasErrors('login')} ? 'error' : ''"
                           th:placeholder="#{auth.register.login.placeholder}"
                           required
                           autocomplete="username">
                </div>
                <div th:if="${#fields.hasErrors('login')}" class="error-message">
                    <svg width="16" height="16" fill="currentColor" viewBox="0 0 20 20">
                        <path fill-rule="evenodd" d="M10 18a8 8 0 100-16 8 8 0 000 16zM8.707 7.293a1 1 0 00-1.414 1.414L8.586 10l-1.293 1.293a1 1 0 101.414 1.414L10 11.414l1.293 1.293a1 1 0 001.414-1.414L11.414 10l1.293-1.293a1 1 0 00-1.414-1.414L10 8.586 8.707 7.293z" clip-rule="evenodd"/>
                    </svg>
                    <span th:errors="*{login}">Login Error</span>
                </div>
            </div>

            <div class="form-group">
                <label for="password" class="form-label"><span th:text="#{user.password}">Пароль</span> <span style="color: var(--danger-color);">*</span></label>
                <div class="form-input-wrapper">
                    <svg class="form-input-icon" width="20" height="20" fill="currentColor" viewBox="0 0 20 20">
                        <path fill-rule="evenodd" d="M5 9V7a5 5 0 0110 0v2a2 2 0 012 2v5a2 2 0 01-2 2H5a2 2 0 01-2-2v-5a2 2 0 012-2zm8-2v2H7V7a3 3 0 016 0z" clip-rule="evenodd"/>
                    </svg>
                    <input type="password"
                           th:field="*{password}"
                           id="password"
                           class="form-input form-input-with-icon"
                           th:classappend="${#fields.hasErrors('password')} ? 'error' : ''"
                           th:placeholder="#{auth.register.password.placeholder}"
                           required
                           autocomplete="new-password">
                </div>
                <div th:if="${#fields.hasErrors('password')}" class="error-message">
                    <svg width="16" height="16" fill="currentColor" viewBox="0 0 20 20">
                        <path fill-rule="evenodd" d="M10 18a8 8 0 100-16 8 8 0 000 16zM8.707 7.293a1 1 0 00-1.414 1.414L8.586 10l-1.293 1.293a1 1 0 101.414 1.414L10 11.414l1.293 1.293a1 1 0 001.414-1.414L11.414 10l1.293-1.293a1 1 0 00-1.414-1.414L10 8.586 8.707 7.293z" clip-rule="evenodd"/>
                    </svg>
                    <span th:errors="*{password}">Password Error</span>
                </div>
            </div>

            <div class="form-group">
                <label for="name" class="form-label"><span th:text="#{user.name}">Имя</span> <span style="color: var(--danger-color);">*</span></label>
                <div class="form-input-wrapper">
                    <svg class="form-input-icon" width="20" height="20" fill="currentColor" viewBox="0 0 20 20">
                        <path fill-rule="evenodd" d="M18 10a8 8 0 11-16 0 8 8 0 0116 0zm-6-3a2 2 0 11-4 0 2 2 0 014 0zm-2 4a5 5 0 00-4.546 2.916A5.986 5.986 0 0010 16a5.986 5.986 0 004.546-2.084A5 5 0 0010 11z" clip-rule="evenodd"/>
                    </svg>
                    <input type="text"
                           th:field="*{name}"
                           id="name"
                           class="form-input form-input-with-icon"
                           th:classappend="${#fields.hasErrors('name')} ? 'error' : ''"
                           th:placeholder="#{auth.name.placeholder}"
                           required
                           autocomplete="given-name">
                </div>
                <div th:if="${#fields.hasErrors('name')}" class="error-message">
                    <svg width="16" height="16" fill="currentColor" viewBox="0 0 20 20">
                        <path fill-rule="evenodd" d="M10 18a8 8 0 100-16 8 8 0 000 16zM8.707 7.293a1 1 0 00-1.414 1.414L8.586 10l-1.293 1.293a1 1 0 101.414 1.414L10 11.414l1.293 1.293a1 1 0 001.414-1.414L11.414 10l1.293-1.293a1 1 0 00-1.414-1.414L10 8.586 8.707 7.293z" clip-rule="evenodd"/>
                    </svg>
                    <span th:errors="*{name}">Name Error</span>
                </div>
            </div>

            <div class="form-group">
                <label for="lastName" class="form-label"><span th:text="#{user.last.name}">Фамилия</span> <span style="color: var(--danger-color);">*</span></label>
                <div class="form-input-wrapper">
                    <svg class="form-input-icon" width="20" height="20" fill="currentColor" viewBox="0 0 20 20">
                        <path fill-rule="evenodd" d="M10 9a3 3 0 100-6 3 3 0 000 6zm-7 9a7 7 0 1114 0H3z" clip-rule="evenodd"/>
                    </svg>
                    <input type="text"
                           th:field="*{lastName}"
                           id="lastName"
                           class="form-input form-input-with-icon"
                           th:classappend="${#fields.hasErrors('lastName')} ? 'error' : ''"
                           th:placeholder="#{auth.lastname.placeholder}"
                           required
                           autocomplete="family-name">
                </div>
                <div th:if="${#fields.hasErrors('lastName')}" class="error-message">
                    <svg width="16" height="16" fill="currentColor" viewBox="0 0 20 20">
                        <path fill-rule="evenodd" d="M10 18a8 8 0 100-16 8 8 0 000 16zM8.707 7.293a1 1 0 00-1.414 1.414L8.586 10l-1.293 1.293a1 1 0 101.414 1.414L10 11.414l1.293 1.293a1 1 0 001.414-1.414L11.414 10l1.293-1.293a1 1 0 00-1.414-1.414L10 8.586 8.707 7.293z" clip-rule="evenodd"/>
                    </svg>
                    <span th:errors="*{lastName}">Lastname Error</span>
                </div>
            </div>

            <button type="submit" class="btn btn-primary" th:text="#{auth.register.submit}">
                Зарегистрироваться
            </button>
        </form>

        <div class="auth-divider">
            <span class="auth-divider-text" th:text="#{auth.or}">или</span>
        </div>

        <div class="auth-footer">
            <p style="margin-bottom: var(--space-3); color: var(--gray-600); font-size: var(--text-sm);" th:text="#{auth.have.account}">
                Уже есть аккаунт?
            </p>
            <a href="/login" class="btn btn-secondary" style="display: inline-block; text-decoration: none;" th:text="#{auth.login.submit}">
                Войти
            </a>
        </div>
    </div>
</body>
</html>
