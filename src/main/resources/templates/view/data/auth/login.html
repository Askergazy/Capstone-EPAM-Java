<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="#{auth.login.title} + ' - Online Shop'">Вход - Online Shop</title>
    <link rel="stylesheet" href="/css/variables.css">
    <link rel="stylesheet" href="/css/base.css">
    <link rel="stylesheet" href="/css/components.css">
    <style>
        body {
            background: linear-gradient(135deg, var(--primary-light) 0%, var(--white) 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: var(--space-4);
        }

        .auth-container {
            background: var(--white);
            padding: var(--space-8);
            border-radius: var(--radius-lg);
            box-shadow: var(--shadow-xl);
            width: 100%;
            max-width: 420px;
        }

        .auth-header {
            text-align: center;
            margin-bottom: var(--space-8);
        }

        .auth-logo {
            width: 64px;
            height: 64px;
            margin: 0 auto var(--space-4);
            background: var(--primary-color);
            border-radius: var(--radius-full);
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--white);
            font-size: var(--text-3xl);
            font-weight: 700;
        }

        .auth-title {
            font-size: var(--text-2xl);
            font-weight: 700;
            color: var(--gray-900);
            margin-bottom: var(--space-2);
        }

        .auth-subtitle {
            color: var(--gray-600);
            font-size: var(--text-sm);
        }

        .auth-form {
            display: flex;
            flex-direction: column;
            gap: var(--space-5);
        }

        .form-group {
            display: flex;
            flex-direction: column;
            gap: var(--space-2);
        }

        .form-label {
            font-size: var(--text-sm);
            font-weight: 600;
            color: var(--gray-700);
        }

        .form-input-wrapper {
            position: relative;
        }

        .form-input-icon {
            position: absolute;
            left: 12px;
            top: 50%;
            transform: translateY(-50%);
            color: var(--gray-400);
            pointer-events: none;
        }

        .form-input-with-icon {
            padding-left: 40px;
        }

        .btn-primary {
            width: 100%;
            padding: var(--space-3) var(--space-4);
            font-weight: 600;
        }

        .auth-divider {
            text-align: center;
            margin: var(--space-6) 0;
            position: relative;
        }

        .auth-divider::before {
            content: '';
            position: absolute;
            left: 0;
            top: 50%;
            width: 100%;
            height: 1px;
            background: var(--gray-200);
        }

        .auth-divider-text {
            position: relative;
            background: var(--white);
            padding: 0 var(--space-4);
            color: var(--gray-500);
            font-size: var(--text-sm);
        }

        .auth-footer {
            text-align: center;
        }

        .btn-secondary {
            width: 100%;
        }
    </style>
</head>
<body>
    <div class="auth-container">
        <div class="auth-header">
            <div class="auth-logo">
                <svg width="32" height="32" fill="currentColor" viewBox="0 0 20 20">
                    <path d="M3 1a1 1 0 000 2h1.22l.305 1.222a.997.997 0 00.01.042l1.358 5.43-.893.892C3.74 11.846 4.632 14 6.414 14H15a1 1 0 000-2H6.414l1-1H14a1 1 0 00.894-.553l3-6A1 1 0 0017 3H6.28l-.31-1.243A1 1 0 005 1H3zM16 16.5a1.5 1.5 0 11-3 0 1.5 1.5 0 013 0zM6.5 18a1.5 1.5 0 100-3 1.5 1.5 0 000 3z"/>
                </svg>
            </div>
            <h1 class="auth-title" th:text="#{auth.welcome}">Добро пожаловать</h1>
            <p class="auth-subtitle" th:text="#{auth.login.subtitle}">Войдите в свою учетную запись</p>
        </div>

        <div th:if="${param.error}" class="alert alert-danger">
            <svg width="20" height="20" fill="currentColor" viewBox="0 0 20 20">
                <path fill-rule="evenodd" d="M10 18a8 8 0 100-16 8 8 0 000 16zM8.707 7.293a1 1 0 00-1.414 1.414L8.586 10l-1.293 1.293a1 1 0 101.414 1.414L10 11.414l1.293 1.293a1 1 0 001.414-1.414L11.414 10l1.293-1.293a1 1 0 00-1.414-1.414L10 8.586 8.707 7.293z" clip-rule="evenodd"/>
            </svg>
            <span th:text="#{auth.error}">Неверный логин или пароль</span>
        </div>

        <form name="f" method="post" th:action="@{/auth/login}" class="auth-form">
            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>

            <div class="form-group">
                <label for="login" class="form-label" th:text="#{user.login}">Логин</label>
                <div class="form-input-wrapper">
                    <svg class="form-input-icon" width="20" height="20" fill="currentColor" viewBox="0 0 20 20">
                        <path fill-rule="evenodd" d="M10 9a3 3 0 100-6 3 3 0 000 6zm-7 9a7 7 0 1114 0H3z" clip-rule="evenodd"/>
                    </svg>
                    <input type="text"
                           name="login"
                           id="login"
                           class="form-input form-input-with-icon"
                           th:placeholder="#{auth.login.placeholder}"
                           required
                           autocomplete="username">
                </div>
            </div>

            <div class="form-group">
                <label for="password" class="form-label" th:text="#{user.password}">Пароль</label>
                <div class="form-input-wrapper">
                    <svg class="form-input-icon" width="20" height="20" fill="currentColor" viewBox="0 0 20 20">
                        <path fill-rule="evenodd" d="M5 9V7a5 5 0 0110 0v2a2 2 0 012 2v5a2 2 0 01-2 2H5a2 2 0 01-2-2v-5a2 2 0 012-2zm8-2v2H7V7a3 3 0 016 0z" clip-rule="evenodd"/>
                    </svg>
                    <input type="password"
                           name="password"
                           id="password"
                           class="form-input form-input-with-icon"
                           th:placeholder="#{auth.password.placeholder}"
                           required
                           autocomplete="current-password">
                </div>
            </div>

            <button type="submit" class="btn btn-primary" th:text="#{auth.login.submit}">
                Войти
            </button>
        </form>

        <div class="auth-divider">
            <span class="auth-divider-text" th:text="#{auth.or}">или</span>
        </div>

        <div class="auth-footer">
            <p style="margin-bottom: var(--space-3); color: var(--gray-600); font-size: var(--text-sm);" th:text="#{auth.no.account}">
                Нет учетной записи?
            </p>
            <form action="/auth/registration" method="get">
                <button type="submit" class="btn btn-secondary" th:text="#{auth.create.account}">
                    Создать аккаунт
                </button>
            </form>
        </div>
    </div>
</body>
</html>
